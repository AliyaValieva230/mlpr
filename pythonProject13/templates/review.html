<!DOCTYPE html>
<html>
<head>
    <title>Добавить отзыв</title>
</head>
<body>
    <h1>Добавить отзыв о покемоне</h1>
    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}
    <form method="post">
        Имя: <input type="text" name="pokemon_name" required><br>
        Отзыв: <textarea name="review_text" rows="3" cols="50" required></textarea><br>
        Оценка (1-5): <input type="number" name="rating" min="1" max="5" required><br>
        <button type="submit">Отправить</button>
    </form>
    <a href="/">Перейти на главную страницу</a>
</body>
</html>
